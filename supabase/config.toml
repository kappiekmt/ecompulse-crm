project_id = "ecompulse-crm"

[api]
enabled = true

# Webhook receivers and the public REST API must accept unauthenticated calls.
# - calendly-webhook verifies the Calendly HMAC signature inside the function.
# - stripe-webhook verifies the Stripe signature inside the function.
# - public-api verifies a Bearer API key inside the function.
[functions.calendly-webhook]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

# Slack app receiver — slash commands, Events API, interactivity.
# Verifies the Slack signing secret inside the function, no JWT needed.
[functions.slack-app]
verify_jwt = false

[functions.public-api]
verify_jwt = false

# EOD report — accepts either a service-role token (pg_cron) or an admin user JWT.
# Auth is enforced inside the function.
[functions.eod-report]
verify_jwt = false

# Reminder dispatcher — JWT enforced by gateway, role check inline.
# pg_cron calls it every minute with the project's service_role JWT.
[functions.dispatch-reminders]
verify_jwt = true

# Admin-only "Test all automations" panel. JWT required (gateway-enforced).
# Role check inline rejects anyone who isn't an admin team_member.
[functions.automation-tests]
verify_jwt = true

# Discord invite generator — admin OR the student's coach can issue.
# JWT enforced by gateway; the function itself enforces RLS via the user's
# JWT, so non-admin/non-coach callers can't read the student row.
[functions.discord-invite]
verify_jwt = true

# Slack notification when a student is assigned to a coach.
# Called by a students.coach_id Postgres trigger via pg_net (service_role
# JWT). Gateway enforces auth.
[functions.notify-coach-assigned]
verify_jwt = true

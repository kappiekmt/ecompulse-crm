project_id = "ecompulse-crm"

[api]
enabled = true

# Webhook receivers and the public REST API must accept unauthenticated calls.
# - calendly-webhook verifies the Calendly HMAC signature inside the function.
# - stripe-webhook verifies the Stripe signature inside the function.
# - public-api verifies a Bearer API key inside the function.
[functions.calendly-webhook]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

# Fathom call-recording webhook — verifies the X-Fathom-Secret header inside
# the function so we can leave the gateway open for Fathom's POSTs.
[functions.fathom-webhook]
verify_jwt = false

# Slack app receiver — slash commands, Events API, interactivity.
# Verifies the Slack signing secret inside the function, no JWT needed.
[functions.slack-app]
verify_jwt = false

[functions.public-api]
verify_jwt = false

# EOD report — accepts either a service-role token (pg_cron) or an admin user JWT.
# Auth is enforced inside the function.
[functions.eod-report]
verify_jwt = false

# Reminder dispatcher — JWT enforced by gateway, role check inline.
# pg_cron calls it every minute with the project's service_role JWT.
[functions.dispatch-reminders]
verify_jwt = true

# Admin-only "Test all automations" panel. JWT required (gateway-enforced).
# Role check inline rejects anyone who isn't an admin team_member.
[functions.automation-tests]
verify_jwt = true

# Discord invite generator — admin OR the student's coach can issue.
# JWT enforced by gateway; the function itself enforces RLS via the user's
# JWT, so non-admin/non-coach callers can't read the student row.
[functions.discord-invite]
verify_jwt = true

# Slack notification when a student is assigned to a coach.
# Called by a students.coach_id Postgres trigger via pg_net (service_role
# JWT). Gateway enforces auth.
[functions.notify-coach-assigned]
verify_jwt = true

# Deal-closed Slack alert — closer or admin fires it from the Log Close
# dialog. Gateway enforces JWT; the function uses the admin client to read
# the deal regardless of the caller's RLS scope.
[functions.notify-deal-closed]
verify_jwt = true

# Installment-paid Slack alert — fired when a closer flips a single
# deal_installments row to paid from the lead drawer.
[functions.notify-installment-paid]
verify_jwt = true

# Daily 09:00 Amsterdam — detects scheduled installments past their grace
# period, flips them to status=failed, fires summary alert per closer to
# #b-payment-failed. Service-role-callable from pg_cron.
[functions.check-overdue-payments]
verify_jwt = true

# Daily 10:00 Amsterdam — walks failed installments and fires the
# next-stage escalation (Day 1 reminder stub → Day 3 closer alert →
# Day 7 admin escalation → Day 14 access pause). Idempotent.
[functions.payment-recovery-sequence]
verify_jwt = true

# Every 15 min — refreshes closer_stats_daily materialized view via RPC.
[functions.refresh-closer-stats]
verify_jwt = true

# Closer DM with commission breakdown after each payment. App-triggered
# from closes.ts after the payment row is inserted.
[functions.notify-commission-earned]
verify_jwt = true

# Monday 09:00 Amsterdam — weekly closer recap DM with prior-4-week
# baseline + Claude coaching note.
[functions.weekly-closer-recap]
verify_jwt = true
